<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:        #FFFFFF;
  --off-white:    #F4F4F5;
  --grey-1:       #A1A1AA;
  --grey-2:       #52525B;
  --grey-3:       #27272A;
  --glass-bg:     rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.10);
  --glass-hover:  rgba(255,255,255,0.09);
  --accent:       rgba(255,255,255,0.80);
}

html, body {
  min-height: 100%;
  background: #000000;
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  color: var(--white);
}

/* ── BACKGROUND ── */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 55% 40% at 10% 8%,  rgba(255,255,255,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 50% 45% at 90% 90%,  rgba(255,255,255,0.03) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 50% 50%,  rgba(20,20,20,0.60)   0%, transparent 80%);
  pointer-events: none;
}

/* subtle grid lines */
.bg-layer::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* corner vignette */
.bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.70) 100%);
  pointer-events: none;
}

#particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

.page {
  position: relative;
  z-index: 2;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(20px, 4vw, 40px) clamp(16px, 5vw, 24px) clamp(30px, 6vw, 50px);
}

/* ── LOGO ── */
.logo-block {
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.10s forwards;
  margin-bottom: clamp(4px, 1.5vw, 10px);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  position: relative;
}

.brand-logo-img {
  display: block;
  width: clamp(180px, 55vw, 360px);
  height: auto;
  position: relative;
  z-index: 1;
  filter: brightness(1.05) drop-shadow(0 0 20px rgba(255,255,255,0.12));
}

/* ── STARS ── */
.stars-block {
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.22s forwards;
  text-align: center;
  margin-bottom: clamp(12px, 2.5vw, 18px);
}

.stars {
  display: inline-flex;
  gap: 5px;
  margin-bottom: 6px;
}

.star {
  font-size: clamp(17px, 4vw, 20px);
  color: var(--white);
  display: inline-block;
  animation: starPulse 3s ease-in-out infinite;
  filter: drop-shadow(0 0 5px rgba(255,255,255,0.60));
}
.star:nth-child(2) { animation-delay: 0.12s; }
.star:nth-child(3) { animation-delay: 0.24s; }
.star:nth-child(4) { animation-delay: 0.36s; }
.star:nth-child(5) { animation-delay: 0.48s; }

.stars-label {
  font-size: 8.5px;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--grey-1);
}

/* ── CATEGORY FILTER ROW ── */
.cat-block {
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.32s forwards;
  width: 100%;
  max-width: 460px;
  margin-bottom: clamp(10px, 2vw, 14px);
}

.cat-row {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  justify-content: center;
}

.cat-btn {
  padding: 7px 14px;
  border-radius: 100px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--grey-1);
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.20s ease;
  white-space: nowrap;
}

.cat-btn:hover {
  background: rgba(255,255,255,0.10);
  color: var(--white);
  border-color: rgba(255,255,255,0.25);
}

.cat-btn.active {
  background: var(--white);
  color: #000000;
  border-color: var(--white);
  box-shadow: 0 0 18px rgba(255,255,255,0.18);
}

/* ── CARD ── */
.card-wrap {
  width: 100%;
  max-width: 460px;
  padding: 1px;
  border-radius: 16px;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.04) 40%,
    rgba(255,255,255,0.12) 100%);
  animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.42s both;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.60),
    0 2px 0 rgba(255,255,255,0.04) inset;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  border-radius: 15px;
  padding: clamp(22px, 5vw, 30px) clamp(20px, 5vw, 28px) clamp(18px, 4vw, 24px);
  position: relative;
  overflow: hidden;
}

/* inner shimmer top line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 40%, rgba(255,255,255,0.60) 50%, rgba(255,255,255,0.35) 60%, transparent 100%);
}

/* corner accent top-right */
.card::after {
  content: '';
  position: absolute;
  top: 12px; right: 12px;
  width: 16px; height: 16px;
  border-top: 1px solid rgba(255,255,255,0.22);
  border-right: 1px solid rgba(255,255,255,0.22);
  pointer-events: none;
}

/* corner accent bottom-left */
.card-inner-corner {
  position: absolute;
  bottom: 12px; left: 12px;
  width: 16px; height: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.22);
  border-left: 1px solid rgba(255,255,255,0.22);
  pointer-events: none;
}

.card-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.card-label-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
}
.card-label-line.r { background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent); }
.card-label-text {
  font-size: 7.5px;
  font-weight: 700;
  letter-spacing: 0.30em;
  text-transform: uppercase;
  color: var(--grey-1);
  white-space: nowrap;
}

.review-text {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(13.5px, 3.4vw, 15px);
  font-weight: 400;
  line-height: 1.90;
  color: var(--white);
  min-height: 90px;
  word-break: break-word;
  transition: opacity 0.18s ease;
  letter-spacing: 0.005em;
}
.review-text.fade { opacity: 0; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: clamp(14px, 3vw, 20px) 0;
}
.div-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12));
}
.div-line.r { background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent); }
.div-gem {
  color: rgba(255,255,255,0.25);
  font-size: 8px;
  line-height: 1;
}

/* ── BUTTONS ── */
.btn-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.btn-cta {
  flex: 1;
  min-height: 50px;
  padding: 0 18px;
  background: var(--white);
  color: #000000;
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(9px, 2.3vw, 11px);
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.80);
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
  box-shadow: 0 4px 18px rgba(255,255,255,0.10);
}

.btn-cta::after {
  content: '';
  position: absolute;
  top: 0; left: -120%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.30) 50%, transparent 100%);
  transform: skewX(-18deg);
  pointer-events: none;
}

.btn-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(255,255,255,0.18);
}
.btn-cta:hover::after { animation: shimmerSweep 0.60s ease forwards; }
.btn-cta:active { transform: scale(0.97); }

.btn-cta.success {
  background: rgba(255,255,255,0.10);
  color: var(--white);
  border-color: rgba(255,255,255,0.30);
}

.btn-refresh {
  flex: 0 0 50px;
  height: 50px;
  background: var(--glass-bg);
  color: var(--grey-1);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.20s ease;
}
.btn-refresh:hover {
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.25);
  color: var(--white);
  transform: translateY(-1px);
}
.btn-refresh:active { transform: scale(0.95); }
.btn-refresh svg { transition: transform 0.45s cubic-bezier(.4,2,.55,.9); }
.btn-refresh.spinning svg { transform: rotate(360deg); }

/* ── BOTTOM STRIP ── */
.bottom-strip {
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.58s forwards;
  text-align: center;
  margin-top: clamp(14px, 3vw, 20px);
}

.badge-row {
  display: flex;
  align-items: center;
  justify-content: center;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  background: var(--glass-bg);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--grey-1);
}

.badge-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--white);
  animation: dotPulse 2s ease-in-out infinite;
  box-shadow: 0 0 6px rgba(255,255,255,0.80);
}

.address-text {
  margin-top: 8px;
  font-size: 10.5px;
  color: var(--grey-2);
  letter-spacing: 0.03em;
  line-height: 1.7;
}

.hint-text {
  margin-top: 9px;
  font-size: 10.5px;
  color: var(--grey-1);
  letter-spacing: 0.02em;
  min-height: 16px;
  transition: color 0.3s ease;
}

/* ── KEYFRAMES ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes starPulse {
  0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 3px rgba(255,255,255,0.50)); }
  50%       { transform: scale(1.1); filter: drop-shadow(0 0 12px rgba(255,255,255,0.90)); }
}
@keyframes shimmerSweep {
  0%   { left: -120%; }
  100% { left: 160%; }
}
@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.25; transform: scale(0.55); }
}
</style>
</head>

}

    return pick(L_DETAILS) + ". " + pick(G_SERVICE) + ". Laptop khareedna ho toh Shubham Enterprises Sigra, full stop.";
  }

  // ALL
  var roll = Math.floor(rnd() * 20);
  if (roll < 3)  return pick(P_OPENERS) + ". " + pick(P_DETAILS) + ". " + pick(G_SERVICE) + ".";
  if (roll < 5)  return pick(A_OPENERS) + ". " + pick(A_DETAILS) + ". " + pick(G_SERVICE) + ".";
  if (roll < 7)  return pick(T_OPENERS) + ". " + pick(T_DETAILS) + ". " + pick(G_SERVICE) + ".";
  if (roll < 9)  return pick(L_OPENERS) + ". " + pick(L_DETAILS) + ". " + pick(G_SERVICE) + ".";
  if (roll < 11) return pick(P_HI) + ". " + pick(G_SERVICE) + ".";
  if (roll < 13) return pick(A_HI) + ". " + pick(G_SERVICE) + ".";
  if (roll < 15) return pick(T_HI) + ". " + pick(G_SERVICE) + ".";
  if (roll < 17) return pick(L_HI) + ". " + pick(G_SERVICE) + ".";
  if (roll < 19) return pick(G_SERVICE) + " " + pick(P_DETAILS) + ".";
  return pick(G_SERVICE) + " " + pick(A_DETAILS) + ".";
}

function buildReview() {
  var v, n = 0;
  do { v = compose(); n++; } while (inBuf(v) && n < 50);
  addBuf(v);
  return v;
}

var currentReview = "";

function displayReview(anim) {
  var el = document.getElementById("reviewText");
  if (anim) {
    el.classList.add("fade");
    setTimeout(function() {
      currentReview = buildReview();
      el.textContent = currentReview;
      el.classList.remove("fade");
    }, 160);
  } else {
    currentReview = buildReview();
    el.textContent = currentReview;
  }
}

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  activeCat = btn.getAttribute('data-cat');
  buf = []; // reset buffer on category change
  refreshReview();
}

function refreshReview() {
  var btn = document.getElementById("btnRefresh");
  btn.classList.add("spinning");
  displayReview(true);
  setTimeout(function() { btn.classList.remove("spinning"); }, 430);
  var cb = document.getElementById("btnCopy");
  cb.textContent = "Copy & Post on Google";
  cb.classList.remove("success");
  document.getElementById("hint").textContent = "Tap to copy your review, then paste it on Google.";
}

function copyAndGo() {
  var btn = document.getElementById("btnCopy");
  function afterCopy() {
    btn.textContent = "Copied! Opening Google\u2026 \u2713";
    btn.classList.add("success");
    document.getElementById("hint").textContent = "Paste it in the review box on Google. \uD83D\uDCF1";
    setTimeout(function() { window.open(reviewLink, "_blank"); }, 900);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentReview).then(afterCopy).catch(fallback);
  } else { fallback(); }
  function fallback() {
    var ta = document.createElement("textarea");
    ta.value = currentReview;
    ta.setAttribute("readonly", "");
    ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;pointer-events:none;";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
    afterCopy();
  }
}

window.addEventListener("DOMContentLoaded", function() { displayReview(false); });

// ── PARTICLE SYSTEM (white dust) ──────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }
  window.addEventListener('resize', resize);
  resize();

  function Particle() { this.reset(true); }
  Particle.prototype.reset = function(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : H + 8;
    this.r  = Math.random() * 1.0 + 0.25;
    this.vx = (Math.random() - 0.5) * 0.18;
    this.vy = -(Math.random() * 0.28 + 0.07);
    this.life  = Math.random() * Math.PI;
    this.speed = 0.004 + Math.random() * 0.005;
  };

  var particles = [];
  for (var i = 0; i < 35; i++) { particles.push(new Particle()); }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life += p.speed;
      if (p.y < -12) { p.reset(false); continue; }
      var alpha = Math.sin(p.life) * 0.35;
      if (alpha < 0) { p.reset(false); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
